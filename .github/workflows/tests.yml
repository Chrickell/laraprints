name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Composer Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict

  test:
    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}
    runs-on: ubuntu-latest
    needs: validate

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: "8.1"
            laravel: "^10.0"
            testbench: "^8.0"
            phpunit: "^10.5"
            prefer_lowest: false
          - php: "8.1"
            laravel: "^10.0"
            testbench: "^8.0"
            phpunit: "^10.5"
            prefer_lowest: true
          - php: "8.2"
            laravel: "^11.0"
            testbench: "^9.0"
            phpunit: "^11.5"
            prefer_lowest: false
          - php: "8.3"
            laravel: "^12.0"
            testbench: "^10.0"
            phpunit: "^11.5"
            prefer_lowest: false
          - php: "8.3"
            laravel: "13.x-dev"
            testbench: "11.x-dev"
            phpunit: "^12.0"
            prefer_lowest: false

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          extensions: mbstring, sqlite3, pdo_sqlite, dom, curl, json
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ~/.composer/cache/files
          key: ${{ runner.os }}-php${{ matrix.php }}-laravel${{ matrix.laravel }}-low${{ matrix.prefer_lowest }}-${{ hashFiles('composer.lock', 'composer.json') }}
          restore-keys: |
            ${{ runner.os }}-php${{ matrix.php }}-laravel${{ matrix.laravel }}-low${{ matrix.prefer_lowest }}-
            ${{ runner.os }}-php${{ matrix.php }}-

      - name: Pin framework dependencies
        run: |
          composer require --no-interaction --no-update \
            "illuminate/support:${{ matrix.laravel }}" \
            "illuminate/database:${{ matrix.laravel }}" \
            "illuminate/queue:${{ matrix.laravel }}" \
            "illuminate/routing:${{ matrix.laravel }}" \
            "illuminate/http:${{ matrix.laravel }}"

      - name: Pin test dependencies
        run: |
          composer require --dev --no-interaction --no-update \
            "orchestra/testbench:${{ matrix.testbench }}" \
            "phpunit/phpunit:${{ matrix.phpunit }}"

      - name: Install dependencies (prefer-stable)
        if: matrix.prefer_lowest == false
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Install dependencies (prefer-lowest)
        if: matrix.prefer_lowest == true
        run: composer update --prefer-lowest --prefer-stable --no-interaction --no-progress

      - name: Run tests
        run: vendor/bin/phpunit --do-not-cache-result
